<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Engineering RAG Assistant</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="app-root" id="app-root">
    <aside class="history-panel panel-surface" id="history-panel">
      <header class="side-header">
        <div class="side-title-block">
          <p class="eyebrow">对话历史</p>
          <h1 class="side-title">历史记录</h1>
        </div>
        <div class="side-actions">
          <button class="text-action" id="new-chat-button" type="button">新建对话</button>
          <button class="icon-action" id="close-left-button" type="button" aria-label="关闭左侧栏">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 18 9 12l6-6"/></svg>
          </button>
        </div>
      </header>
      <nav class="session-list" id="session-list" aria-label="对话历史列表"></nav>
    </aside>

    <main class="chat-panel panel-surface" id="chat-panel">
      <header class="chat-header">
        <button class="panel-open-button" id="open-left-button" type="button" aria-label="打开左侧栏">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 18l6-6-6-6"/></svg>
          <span>历史</span>
        </button>

        <div class="chat-header-copy">
          <p class="eyebrow">Engineering RAG Assistant</p>
          <h2 class="chat-title" id="chat-title">新对话</h2>
          <p class="chat-status" id="stream-status">服务状态检测中</p>
        </div>

        <button class="panel-open-button" id="open-right-button" type="button" aria-label="打开右侧栏">
          <span>引用</span>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
        </button>
      </header>

      <section class="message-thread" id="message-thread" aria-label="对话内容" aria-live="polite"></section>

      <footer class="composer-wrap">
        <form class="composer" id="ask-form">
          <button class="composer-icon-button" id="upload-trigger" type="button" aria-label="上传文件">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
          </button>
          <input id="file-input" type="file" name="files" multiple hidden>
          <label class="visually-hidden" for="question-input">输入问题</label>
          <textarea
            id="question-input"
            rows="1"
            placeholder="请输入你的问题，Shift + Enter 换行，Enter 发送"
          ></textarea>
          <button class="send-button" id="ask-button" type="submit">发送</button>
        </form>
        <div class="upload-feedback" id="ingest-feedback" aria-live="polite"></div>
      </footer>
    </main>

    <aside class="sources-panel panel-surface" id="sources-panel">
      <header class="side-header">
        <div class="side-title-block">
          <p class="eyebrow">引用数据源</p>
          <h2 class="side-title">Sources</h2>
        </div>
        <button class="icon-action" id="close-right-button" type="button" aria-label="关闭右侧栏">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg>
        </button>
      </header>
      <div class="sources-list" id="sources-list"></div>
    </aside>
  </div>

  <script src="/static/app.js" defer></script>
</body>
</html>
